name: Manual Android Build & Sign

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version_name: ${{ steps.vars.outputs.VERSION_NAME }}
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission
      run: chmod +x gradlew

    - name: Build APKs
      run: ./gradlew assembleDebug assembleRelease

    - name: Extract Version Name
      id: vars
      run: |
        VERSION_NAME=$(grep "versionName" app/build.gradle | head -n 1 | awk -F '["'\'']' '{print $2}')
        echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_OUTPUT

    - name: Upload Raw APKs
      uses: actions/upload-artifact@v4
      with:
        name: raw-apks
        path: |
          app/build/outputs/apk/release/*.apk
          app/build/outputs/apk/debug/*.apk

  sign:
    runs-on: ubuntu-latest
    needs: build
    steps:
    - name: Download Raw APKs
      uses: actions/download-artifact@v4
      with:
        name: raw-apks
        path: apks

    - name: Sign Release APK
      uses: r0adkll/sign-android-release@v1
      id: sign_app
      with:
        releaseDirectory: apks/release
        signingKeyBase64: ${{ secrets.SIGNATURE }}
        alias: ${{ secrets.SIGNATURE_ALIAS }}
        keyStorePassword: ${{ secrets.SIGNATURE_PASSWORD }}
        keyPassword: ${{ secrets.SIGNATURE_PASSWORD }}
      env:
        BUILD_TOOLS_VERSION: "34.0.0"

    - name: Prepare Final Files
      run: |
        mkdir -p final_apks
        VERSION="${{ needs.build.outputs.version_name }}"
        SIGNED_FILE=$(find apks/release -name "*-signed.apk" | head -n 1)
        cp "$SIGNED_FILE" final_apks/lsposed_shortcut_v${VERSION}_signed.apk
        cp apks/debug/app-debug.apk final_apks/temp-unsigned.apk
        zip -d final_apks/temp-unsigned.apk "META-INF/*"
        mv final_apks/temp-unsigned.apk final_apks/lsposed_shortcut_v${VERSION}_unsigned.apk

    - name: Upload Final Bundle
      uses: actions/upload-artifact@v4
      with:
        name: lsposed_shortcut_v${{ needs.build.outputs.version_name }}_builds
        path: final_apks/*.apk
        
